name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    # main -> UAT (continuous). release/** branches and release tags -> PROD.
    # A tag push matches only the tags filter, so tags are prod-only.
    branches: [main, "release/**"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Target environment (uat or prod)
        required: false
        default: "uat"
        type: choice
        options:
          - uat
          - prod
      target_host:
        description: Ansible host or alias (overrides the env-resolved host)
        required: false
        default: ""
        type: string
      run_apply:
        description: Apply deployment
        required: true
        default: true
        type: boolean
      internal_service_token:
        description: Optional ACP auth token
        required: false
        default: ""
        type: string
      vault_addr:
        description: >-
          Fallback Vault address, only used when vault_token is also set
          (bypasses the github-actions-accounts OIDC role). Leave empty to
          use https://vault.svc.plus via OIDC.
        required: false
        default: ""
        type: string
      vault_token:
        description: >-
          Fallback Vault token (method=token) for when the OIDC JWT role is
          broken or unavailable. The value is visible in this run's Inputs
          summary — GitHub does not mask workflow_dispatch inputs. Prefer
          fixing the OIDC role over using this repeatedly, and revoke the
          token after use.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Prod host defaults to the historical single host; override with the
  # PROD_TARGET_HOST repo variable. UAT_TARGET_HOST must be set for main -> uat
  # deploys (the flags script fails loudly if a uat deploy has no host).
  DEFAULT_TARGET_HOST: jp-xhttp-contabo.svc.plus
  PROD_TARGET_HOST: ${{ vars.PROD_TARGET_HOST || 'jp-xhttp-contabo.svc.plus' }}
  UAT_TARGET_HOST: ${{ vars.UAT_TARGET_HOST }}

jobs:
  prep:
    name: Prep
    runs-on: ubuntu-latest
    outputs:
      target_host: ${{ steps.flags.outputs.target_host }}
      deploy_env: ${{ steps.flags.outputs.deploy_env }}
      run_apply: ${{ steps.flags.outputs.run_apply }}
      push_image: ${{ steps.flags.outputs.push_image }}
      push_latest: ${{ steps.flags.outputs.push_latest }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve Pipeline Flags
        id: flags
        env:
          IMAGE_REPO_OWNER: ${{ vars.IMAGE_REPO_OWNER || github.repository_owner }}
          DEFAULT_TARGET_HOST: ${{ env.DEFAULT_TARGET_HOST }}
          PROD_TARGET_HOST: ${{ env.PROD_TARGET_HOST }}
          UAT_TARGET_HOST: ${{ env.UAT_TARGET_HOST }}
          INPUT_DEPLOY_ENV: ${{ inputs.deploy_env }}
          INPUT_TARGET_HOST: ${{ inputs.target_host }}
          INPUT_RUN_APPLY: ${{ inputs.run_apply }}
          INPUT_PUSH_IMAGE: ${{ inputs.push_image }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash ./scripts/github-actions/resolve-pipeline-flags.sh >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: prep
    runs-on: ubuntu-latest
    env:
      SERVICE_REGISTRY: ghcr.io
      SERVICE_IMAGE_REPO_OWNER: ${{ vars.IMAGE_REPO_OWNER || github.repository_owner }}
      SERVICE_IMAGE_NAME: accounts
    outputs:
      service_image_repo: ${{ steps.service_image.outputs.repo }}
      service_image_tag: ${{ steps.service_ref.outputs.image_tag }}
      service_image_commit: ${{ steps.service_ref.outputs.image_commit }}
      service_image_ref: ${{ steps.service_ref.outputs.image_ref }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log In To GHCR
        if: needs.prep.outputs.push_image == 'true'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Resolve Service Image Repository
        id: service_image
        run: echo "repo=${SERVICE_REGISTRY}/${SERVICE_IMAGE_REPO_OWNER}/${SERVICE_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute Service Image Tags
        id: service_meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ steps.service_image.outputs.repo }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ needs.prep.outputs.push_latest == 'true' || github.ref == 'refs/heads/main' }}

      - name: Resolve Service Image Ref
        id: service_ref
        run: |
          set -euo pipefail
          image_ref="$(bash .github/scripts/utils/preferred-image-ref.sh "${{ steps.service_meta.outputs.tags }}")"
          image_no_digest="${image_ref%@*}"
          image_tag="${image_no_digest##*:}"
          image_commit=""
          if [[ "${image_tag}" =~ ^[0-9a-f]{7,40}$ ]]; then
            image_commit="${image_tag}"
          fi
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_commit=${image_commit}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Build And Push Service Image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ needs.prep.outputs.push_image == 'true' }}
          tags: ${{ steps.service_meta.outputs.tags }}
          labels: ${{ steps.service_meta.outputs.labels }}

  deploy:
    name: Deploy
    needs:
      - prep
      - build
    if: ${{ needs.prep.outputs.push_image == 'true' }}
    runs-on: ubuntu-latest
    # Binds the run to the GitHub Environment named by deploy_env (uat|prod).
    # Add required-reviewer / branch protection rules to the "prod" environment
    # to gate release deploys; "uat" stays continuous.
    environment: ${{ needs.prep.outputs.deploy_env }}
    outputs:
      image: ${{ needs.build.outputs.service_image_ref }}
      image_ref: ${{ needs.build.outputs.service_image_ref }}
      run_apply: ${{ needs.prep.outputs.run_apply }}
      pushed: "true"
    steps:
      - name: Check Out Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve Deploy Image Artifact
        id: deploy_image
        run: |
          set -euo pipefail

          image_ref="${{ needs.build.outputs.service_image_ref }}"
          image_no_digest="${image_ref%@*}"
          image_tag="${image_no_digest##*:}"

          if [[ -z "${image_ref}" || -z "${image_tag}" ]]; then
            echo "invalid deploy image artifact: ${image_ref}" >&2
            exit 1
          fi

          if [[ ! "${image_tag}" =~ ^sha-([0-9a-f]{40})$ && ! "${image_tag}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "deploy image artifact must be a full-SHA tag: ${image_ref}" >&2
            exit 1
          fi

          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Check Out Playbooks Repository
        # Pull latest playbooks HEAD from the default branch.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: x-evor/playbooks
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: playbooks

      - name: Guard Against Host Image Builds
        working-directory: ${{ github.workspace }}/playbooks
        run: |
          set -euo pipefail

          if grep -REn \
            -e 'docker build' \
            -e 'podman build' \
            -e 'docker buildx build' \
            -e 'gcloud builds submit' \
            deploy_accounts_svc_plus.yml roles/vhosts/accounts_service \
            ; then
            echo "deploy flow must use the build job image artifact and must not build images on the target host" >&2
            exit 1
          fi

      - name: Guard Release Traceability Contract
        working-directory: ${{ github.workspace }}/playbooks
        run: |
          set -euo pipefail

          grep -REn "lookup\\('ansible.builtin.env', 'ACCOUNTS_IMAGE_REF'\\)" \
            deploy_accounts_svc_plus.yml >/dev/null
          grep -REn 'image: "\{\{ accounts_service_image_ref \}\}"' \
            roles/vhosts/accounts_service/templates/docker-compose.yml.j2 >/dev/null
          grep -REn 'IMAGE: "\{\{ accounts_service_image_ref \}\}"' \
            roles/vhosts/accounts_service/templates/docker-compose.yml.j2 >/dev/null
          grep -REn '^IMAGE=\{\{ accounts_service_image_ref \}\}$' \
            roles/vhosts/accounts_service/templates/app.env.j2 >/dev/null

      - name: Set Up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.0.0
        with:
          python-version: "3.11"

      - name: Install Ansible Runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core==2.18.3"

      # Deploy tokens come from Vault kv/accounts.svc.plus via the repo's OIDC
      # role (see docs/tasks/2026-07-11-oauth-login.md secret mapping). GitHub
      # secrets remain as a fallback during the migration window only.
      - name: Mask Vault Token Fallback Input
        if: ${{ inputs.vault_token != '' }}
        run: echo "::add-mask::${{ inputs.vault_token }}"

      - name: Load Vault secrets
        id: vault
        # Vault being unreachable must not block shipping a release: the step
        # may fail and Resolve Deploy Secret Source below falls back to the
        # GitHub-secret mirrors.
        continue-on-error: true
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ inputs.vault_addr != '' && inputs.vault_addr || 'https://vault.svc.plus' }}
          method: ${{ inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ inputs.vault_token }}
          role: github-actions-accounts
          jwtGithubAudience: vault
          exportEnv: false
          # outputToken exposes the job's Vault client token as
          # steps.vault.outputs.vault_token for the Mint Runtime Vault Token
          # step below (output-scoped instead of a job-wide VAULT_TOKEN env).
          outputToken: true
          ignoreNotFound: true
          secrets: |
            kv/data/accounts.svc.plus INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
            kv/data/accounts.svc.plus BRIDGE_REVIEW_AUTH_TOKEN | BRIDGE_REVIEW_AUTH_TOKEN ;
            kv/data/billing-service SANDBOX_STRIPE_SECRET_KEY | SANDBOX_STRIPE_SECRET_KEY ;
            kv/data/billing-service SANDBOX_STRIPE_WEBHOOK_SECRET | SANDBOX_STRIPE_WEBHOOK_SECRET ;
            kv/data/billing-service PROD_STRIPE_SECRET_KEY | PROD_STRIPE_SECRET_KEY ;
            kv/data/billing-service PROD_STRIPE_WEBHOOK_SECRET | PROD_STRIPE_WEBHOOK_SECRET

      # Single decision point for which secret source feeds the deploy: Vault
      # when the step succeeded and returned both tokens, otherwise the
      # GitHub-secret mirrors (Stripe keys keep their own per-key fallback in
      # the playbook env below).
      - name: Resolve Deploy Secret Source
        id: deploy_secrets
        env:
          VAULT_STATUS: ${{ steps.vault.outcome }}
          VAULT_INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
          VAULT_BRIDGE_REVIEW_AUTH_TOKEN: ${{ steps.vault.outputs.BRIDGE_REVIEW_AUTH_TOKEN }}
          FALLBACK_BRIDGE_AUTH_TOKEN: ${{ secrets.BRIDGE_AUTH_TOKEN }}
          FALLBACK_BRIDGE_REVIEW_AUTH_TOKEN: ${{ secrets.BRIDGE_REVIEW_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${VAULT_STATUS}" == "success" && -n "${VAULT_INTERNAL_SERVICE_TOKEN}" && -n "${VAULT_BRIDGE_REVIEW_AUTH_TOKEN}" ]]; then
            echo "bridge_auth_token=${VAULT_INTERNAL_SERVICE_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "bridge_review_auth_token=${VAULT_BRIDGE_REVIEW_AUTH_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "source=vault" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Vault secrets unavailable (outcome: ${VAULT_STATUS}); falling back to GitHub-secret mirrors."
          echo "bridge_auth_token=${FALLBACK_BRIDGE_AUTH_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "bridge_review_auth_token=${FALLBACK_BRIDGE_REVIEW_AUTH_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "source=github_secret" >> "$GITHUB_OUTPUT"

      # Mint a fresh runtime Vault token for the accounts service on every
      # deploy. This removes the manually managed XWORKMATE_VAULT_TOKEN: the
      # short-lived OIDC job token creates an orphan periodic token scoped to
      # the xworkmate-accounts policy, and the playbook writes it into the
      # host's app.env. When Vault auth itself is unavailable the step warns
      # and the deploy continues without rotating (the playbook keeps the
      # host's existing token); when auth works but minting is denied the
      # deploy still fails loudly — shipping with a silently stale token is
      # the 2026-07-12 outage class this step exists to prevent.
      # Requires the github-actions-accounts policy to grant sudo on
      # auth/token/create-orphan (see README "CI/CD 部署前置条件").
      - name: Mint Runtime Vault Token
        id: runtime_vault_token
        env:
          VAULT_TOKEN: ${{ steps.vault.outputs.vault_token }}
          VAULT_ADDR: ${{ inputs.vault_addr != '' && inputs.vault_addr || 'https://vault.svc.plus' }}
        run: |
          set -euo pipefail

          if [[ -z "${VAULT_TOKEN}" ]]; then
            echo "::warning::Skipping runtime Vault token mint: Vault authentication is unavailable. The host keeps its existing XWORKMATE_VAULT_TOKEN."
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          response="$(curl --silent --show-error --fail \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            --request POST \
            --data '{"policies":["xworkmate-accounts"],"period":"768h","display_name":"accounts-svc-runtime"}' \
            "${VAULT_ADDR}/v1/auth/token/create-orphan")"

          token="$(jq -r '.auth.client_token // empty' <<<"${response}")"
          if [[ -z "${token}" ]]; then
            echo "::error::Failed to mint runtime Vault token. Ensure the github-actions-accounts policy grants sudo on auth/token/create-orphan and the xworkmate-accounts policy exists."
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Validate Deploy Secrets
        env:
          BRIDGE_AUTH_TOKEN: ${{ steps.deploy_secrets.outputs.bridge_auth_token }}
          BRIDGE_REVIEW_AUTH_TOKEN: ${{ steps.deploy_secrets.outputs.bridge_review_auth_token }}
        run: |
          set -euo pipefail

          if [[ -z "${BRIDGE_AUTH_TOKEN}" ]]; then
            echo "::error::BRIDGE_AUTH_TOKEN is empty. Ensure kv/accounts.svc.plus INTERNAL_SERVICE_TOKEN is readable via the github-actions-accounts Vault role."
            exit 1
          fi
          if [[ -z "${BRIDGE_REVIEW_AUTH_TOKEN}" ]]; then
            echo "::error::BRIDGE_REVIEW_AUTH_TOKEN is empty. Ensure kv/accounts.svc.plus BRIDGE_REVIEW_AUTH_TOKEN is readable via the github-actions-accounts Vault role."
            exit 1
          fi

      - name: Prepare Runner SSH Access
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          bash ./scripts/github-actions/prepare-ssh.sh \
            "${{ needs.prep.outputs.target_host }}" \
            "${SSH_KNOWN_HOSTS}"

      - name: Run Accounts Deploy Playbook
        working-directory: ${{ github.workspace }}/playbooks
        env:
          ACCOUNTS_IMAGE_REF: ${{ steps.deploy_image.outputs.image_ref }}
          ACCOUNTS_PULL_IMAGE: "true"
          # Vault kv/accounts.svc.plus is the source of truth; the runbook
          # maps INTERNAL_SERVICE_TOKEN to the bridge auth token. GitHub
          # secrets are the migration-window fallback.
          BRIDGE_AUTH_TOKEN: ${{ steps.deploy_secrets.outputs.bridge_auth_token }}
          BRIDGE_REVIEW_AUTH_TOKEN: ${{ steps.deploy_secrets.outputs.bridge_review_auth_token }}
          BRIDGE_SERVER_URL: https://xworkmate-bridge.svc.plus
          # Freshly minted per deploy (Mint Runtime Vault Token step); the
          # playbook rewrites the host's app.env XWORKMATE_VAULT_TOKEN with it
          # so the accounts service never runs on a stale/revoked token.
          XWORKMATE_VAULT_TOKEN: ${{ steps.runtime_vault_token.outputs.token }}
          # OAUTH_GITHUB_* naming: Actions forbids secrets/vars starting with
          # GITHUB_; the playbook role maps these back to GITHUB_CLIENT_* env.
          # Client ID is public but set as a repo variable to keep the literal
          # out of source (and out of the gitleaks gate).
          OAUTH_GITHUB_CLIENT_ID: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          # Google uses the same OAUTH_* convention; empty values leave the
          # Google provider unregistered (login/google → 404) with no impact.
          OAUTH_GOOGLE_CLIENT_ID: ${{ vars.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_TOKEN_PUBLIC_TOKEN: ${{ secrets.AUTH_TOKEN_PUBLIC_TOKEN }}
          AUTH_TOKEN_REFRESH_SECRET: ${{ secrets.AUTH_TOKEN_REFRESH_SECRET }}
          AUTH_TOKEN_ACCESS_SECRET: ${{ secrets.AUTH_TOKEN_ACCESS_SECRET }}
          # Stripe billing. The key pair (sk + whsec, never mixed) follows the
          # deploy environment: prod -> PROD_*, uat -> SANDBOX_*. The STRIPE_MODE
          # repo var is an explicit override (force 'sandbox' in prod for a dry
          # run, or 'prod' in uat). Values come from Vault (OIDC,
          # kv/billing-service SANDBOX_*/PROD_*) with GH secrets as fallback;
          # empty values keep Stripe endpoints disabled. STRIPE_ALLOWED_PRICE_IDS
          # stays a plain var until the billing_plans catalog (P1) replaces it.
          STRIPE_SECRET_KEY: ${{ ((needs.prep.outputs.deploy_env == 'prod' && vars.STRIPE_MODE != 'sandbox') || vars.STRIPE_MODE == 'prod') && (steps.vault.outputs.PROD_STRIPE_SECRET_KEY || secrets.PROD_STRIPE_SECRET_KEY) || (steps.vault.outputs.SANDBOX_STRIPE_SECRET_KEY || secrets.SANDBOX_STRIPE_SECRET_KEY) }}
          STRIPE_WEBHOOK_SECRET: ${{ ((needs.prep.outputs.deploy_env == 'prod' && vars.STRIPE_MODE != 'sandbox') || vars.STRIPE_MODE == 'prod') && (steps.vault.outputs.PROD_STRIPE_WEBHOOK_SECRET || secrets.PROD_STRIPE_WEBHOOK_SECRET) || (steps.vault.outputs.SANDBOX_STRIPE_WEBHOOK_SECRET || secrets.SANDBOX_STRIPE_WEBHOOK_SECRET) }}
          STRIPE_ALLOWED_PRICE_IDS: ${{ vars.STRIPE_ALLOWED_PRICE_IDS }}
        run: |
          set -euo pipefail

          args=(
            ansible-playbook
            -i inventory.ini
            -e "accounts_service_hosts=${{ needs.prep.outputs.target_host }}"
          )

          if [[ "${{ needs.prep.outputs.run_apply }}" != "true" ]]; then
            args+=(-C)
          fi

          args+=(deploy_accounts_svc_plus.yml)

          ANSIBLE_CONFIG="${PWD}/ansible.cfg" \
          ACCOUNTS_PULL_IMAGE="${ACCOUNTS_PULL_IMAGE:-true}" \
          "${args[@]}"


  validate:
    name: Validate
    needs:
      - prep
      - build
      - deploy
    if: ${{ always() && needs.deploy.result == 'success' && needs.deploy.outputs.pushed == 'true' && needs.deploy.outputs.run_apply == 'true' }}
    runs-on: ubuntu-latest
    env:
      # Probe the environment that was actually deployed, not always prod.
      PUBLIC_URL: ${{ needs.prep.outputs.deploy_env == 'prod' && (vars.PROD_PUBLIC_URL || 'https://accounts.svc.plus') || vars.UAT_PUBLIC_URL }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate Deployed Accounts Service
        run: bash ./scripts/github-actions/validate-deploy.sh "${{ needs.build.outputs.service_image_ref }}" "${PUBLIC_URL}"

      - name: Mask Vault Token Fallback Input
        if: ${{ inputs.vault_token != '' }}
        run: echo "::add-mask::${{ inputs.vault_token }}"

      - name: Load Vault secrets
        id: vault
        # Same resilience contract as the deploy job: a Vault outage falls
        # back to the GitHub-secret mirrors instead of skipping validation.
        continue-on-error: true
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ inputs.vault_addr != '' && inputs.vault_addr || 'https://vault.svc.plus' }}
          method: ${{ inputs.vault_token != '' && 'token' || 'jwt' }}
          token: ${{ inputs.vault_token }}
          role: github-actions-accounts
          jwtGithubAudience: vault
          exportEnv: false
          ignoreNotFound: true
          secrets: |
            kv/data/accounts.svc.plus INTERNAL_SERVICE_TOKEN | INTERNAL_SERVICE_TOKEN ;
            kv/data/accounts.svc.plus BRIDGE_REVIEW_AUTH_TOKEN | BRIDGE_REVIEW_AUTH_TOKEN

      - name: Resolve Validate Secret Source
        id: validate_secrets
        env:
          VAULT_STATUS: ${{ steps.vault.outcome }}
          VAULT_INTERNAL_SERVICE_TOKEN: ${{ steps.vault.outputs.INTERNAL_SERVICE_TOKEN }}
          VAULT_BRIDGE_REVIEW_AUTH_TOKEN: ${{ steps.vault.outputs.BRIDGE_REVIEW_AUTH_TOKEN }}
          FALLBACK_BRIDGE_AUTH_TOKEN: ${{ secrets.BRIDGE_AUTH_TOKEN }}
          FALLBACK_BRIDGE_REVIEW_AUTH_TOKEN: ${{ secrets.BRIDGE_REVIEW_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${VAULT_STATUS}" == "success" && -n "${VAULT_INTERNAL_SERVICE_TOKEN}" && -n "${VAULT_BRIDGE_REVIEW_AUTH_TOKEN}" ]]; then
            echo "bridge_auth_token=${VAULT_INTERNAL_SERVICE_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "bridge_review_auth_token=${VAULT_BRIDGE_REVIEW_AUTH_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "source=vault" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Vault secrets unavailable (outcome: ${VAULT_STATUS}); falling back to GitHub-secret mirrors."
          echo "bridge_auth_token=${FALLBACK_BRIDGE_AUTH_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "bridge_review_auth_token=${FALLBACK_BRIDGE_REVIEW_AUTH_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "source=github_secret" >> "$GITHUB_OUTPUT"

      - name: Validate Review XWorkmate Sync Contract
        env:
          REVIEW_ACCOUNT_EMAIL: review@svc.plus
          REVIEW_ACCOUNT_PASSWORD: ${{ secrets.REVIEW_ACCOUNT_PASSWORD }}
          BRIDGE_AUTH_TOKEN: ${{ steps.validate_secrets.outputs.bridge_auth_token }}
          BRIDGE_REVIEW_AUTH_TOKEN: ${{ steps.validate_secrets.outputs.bridge_review_auth_token }}
        run: bash ./scripts/github-actions/validate-review-xworkmate-sync.sh "${PUBLIC_URL}"
